<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Calculator - 美しくスマートな簡易電卓</title>
  <meta name="description" content="グラスモフィズムデザインを採用した、美しくレスポンシブな多機能Web電卓です。計算履歴の保存・閲覧機能、キーボードショートカットに対応しています。">
  
  <!-- Preconnect and Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 背景アニメーション装飾用オーブ -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <main class="app-container">
    <!-- 電卓本体 -->
    <div class="calculator-card" id="calculator">
      <!-- ヘッダー（タイトルと履歴トグル） -->
      <header class="calculator-header">
        <h1 class="app-title">Calculator</h1>
        <button id="toggle-history-btn" class="icon-btn" aria-label="計算履歴を表示" title="計算履歴">
          <!-- 履歴（時計）アイコン -->
          <svg class="icon" viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.53.85-1.07-3.63-2.16V8h-1.5z"/>
          </svg>
        </button>
      </header>

      <!-- ディスプレイ部 -->
      <div class="calculator-display">
        <div id="display-formula" class="formula-line" aria-live="polite"></div>
        <div id="display-input" class="input-line" aria-live="polite">0</div>
      </div>

      <!-- キーパッド -->
      <div class="calculator-keypad">
        <!-- 1行目 -->
        <button class="key action-key" data-action="clear" id="key-clear">AC</button>
        <button class="key action-key" data-action="delete" id="key-delete" aria-label="1文字消去">
          <!-- バックスペースアイコン -->
          <svg class="icon" viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H7.07L2.4 12l4.66-7H22v14zm-11.59-2L14 13.41 17.59 17 19 15.59 15.41 12 19 8.41 17.59 7 14 10.59 10.41 7 9 8.41 12.59 12 9 15.59z"/>
          </svg>
        </button>
        <button class="key action-key" data-action="percent" id="key-percent">%</button>
        <button class="key operator-key" data-operator="divide" id="key-divide">÷</button>

        <!-- 2行目 -->
        <button class="key number-key" data-value="7">7</button>
        <button class="key number-key" data-value="8">8</button>
        <button class="key number-key" data-value="9">9</button>
        <button class="key operator-key" data-operator="multiply" id="key-multiply">×</button>

        <!-- 3行目 -->
        <button class="key number-key" data-value="4">4</button>
        <button class="key number-key" data-value="5">5</button>
        <button class="key number-key" data-value="6">6</button>
        <button class="key operator-key" data-operator="subtract" id="key-subtract">−</button>

        <!-- 4行目 -->
        <button class="key number-key" data-value="1">1</button>
        <button class="key number-key" data-value="2">2</button>
        <button class="key number-key" data-value="3">3</button>
        <button class="key operator-key" data-operator="add" id="key-add">+</button>

        <!-- 5行目 -->
        <button class="key number-key double-width" data-value="0">0</button>
        <button class="key number-key" data-value=".">.</button>
        <button class="key equals-key" data-action="calculate" id="key-equals">=</button>
      </div>
    </div>

    <!-- 履歴サイドパネル (グラスモフィズム) -->
    <aside class="history-panel" id="history-panel" aria-label="計算履歴">
      <div class="history-header">
        <h2>計算履歴</h2>
        <div class="history-actions">
          <button id="clear-history-btn" class="text-btn" aria-label="履歴をすべて削除">クリア</button>
          <button id="close-history-btn" class="icon-btn" aria-label="履歴を閉じる">
            <svg class="icon" viewBox="0 0 24 24" width="24" height="24">
              <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="history-content">
        <ul id="history-list" class="history-list">
          <!-- JavaScriptで動的に追加される -->
          <li class="history-empty">履歴がありません</li>
        </ul>
      </div>
    </aside>
  </main>

  <!-- JavaScript -->
  <script src="script.js"></script>
</body>
</html>
